<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hata</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #f5f5f5;
            color: #333;
            padding: 24px;
        }
        @media (prefers-color-scheme: dark) {
            body { background: #121212; color: #e0e0e0; }
            .card { background: #1e1e1e; }
            .retry-btn { background: #4CAF50; }
        }
        .card {
            text-align: center;
            background: #fff;
            border-radius: 16px;
            padding: 48px 32px;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
        }
        .icon {
            font-size: 64px;
            margin-bottom: 16px;
        }
        h1 {
            font-size: 22px;
            margin-bottom: 12px;
            font-weight: 600;
        }
        p {
            font-size: 15px;
            color: #666;
            margin-bottom: 32px;
            line-height: 1.5;
        }
        @media (prefers-color-scheme: dark) {
            p { color: #aaa; }
        }
        .retry-btn {
            display: inline-block;
            background: #1B5E20;
            color: #fff;
            border: none;
            padding: 14px 40px;
            border-radius: 28px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: transform 0.15s, opacity 0.15s;
        }
        .retry-btn:active {
            transform: scale(0.96);
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">⚠️</div>
        <h1>Bir Hata Oluştu</h1>
        <p>Sayfa yüklenirken bir sorun oluştu. Lütfen tekrar deneyin.</p>
        <a href="app://retry" class="retry-btn">Tekrar Dene</a>
    </div>
</body>
</html>
